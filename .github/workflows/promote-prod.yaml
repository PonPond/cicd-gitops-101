name: Promote to Production

# Manual, deliberate promotion of a known-good staging image to production.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote (e.g. sha-abc1234)"
        required: true

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    # GitHub Environment with required reviewers = the human approval gate.
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
      - name: Compute lowercase repo
        id: meta
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Bump production image tag
        working-directory: gitops/overlays/production
        run: |
          kustomize edit set image \
            app=${{ steps.meta.outputs.repo }}:${{ inputs.image_tag }}
      - name: Commit & push (ArgoCD prod is manual-sync)
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add gitops/overlays/production/kustomization.yaml
          git commit -m "chore(deploy): production -> ${{ inputs.image_tag }}"
          git push
