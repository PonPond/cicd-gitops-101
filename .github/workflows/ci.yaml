name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run test:ci

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: npm audit (high+)
        working-directory: app
        run: npm audit --omit=dev --audit-level=high
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t demo:ci app
      - name: Run container
        run: docker run -d --name demo -p 3000:3000 demo:ci
      - name: Wait for readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/readyz; then echo; exit 0; fi
            sleep 1
          done
          echo "service did not become ready"; docker logs demo; exit 1
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
      - name: Smoke test
        run: k6 run tests/k6/smoke.js
        env:
          BASE_URL: http://localhost:3000
      - name: Load test (perf gate)
        run: k6 run tests/k6/load.js
        env:
          BASE_URL: http://localhost:3000
