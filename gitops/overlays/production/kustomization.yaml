apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-production
nameSuffix: -production

resources:
  - ../../base

# This tag is promoted MANUALLY from a known-good staging build
# (see .github/workflows/promote-prod.yaml). Never auto-bumped.
images:
  - name: app
    newName: ghcr.io/ponpond/cicd-gitops-101
    newTag: latest

# Production runs with more headroom.
patches:
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
