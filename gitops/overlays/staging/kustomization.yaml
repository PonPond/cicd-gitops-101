apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-staging
nameSuffix: -staging

resources:
  - ../../base

# CI auto-bumps this tag on every merge to main, then ArgoCD auto-syncs.
images:
  - name: app
    newName: ghcr.io/ponpond/cicd-gitops-101
    newTag: latest

# Staging runs lean.
patches:
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
