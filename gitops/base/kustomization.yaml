apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - hpa.yaml

commonLabels:
  app: cicd-gitops-101

# Overlays override newTag; CI bumps it via `kustomize edit set image`.
images:
  - name: app
    newName: ghcr.io/ponpond/cicd-gitops-101
    newTag: latest
