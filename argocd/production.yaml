apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicd-gitops-101-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ponpond/cicd-gitops-101.git
    targetRevision: main
    path: gitops/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-production
  # Production: NO automated sync. A human clicks "Sync" in ArgoCD (or it is
  # gated by the promote-prod workflow's environment approval). selfHeal still
  # corrects drift once a revision is synced.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
